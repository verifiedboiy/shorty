<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Spotify Verification</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

    <!-- Top Right Logo (LOCKED - same SVG, no changes) -->
    <div class="top-logo">
        <svg viewBox="0 0 168 168" width="38" height="38">
            <circle fill="#1DB954" cx="84" cy="84" r="84" />
            <path fill="#000"
                d="M119 113c-2 3-6 4-9 2-25-15-57-18-95-8-4 1-8-1-9-5-1-4 1-8 5-9 42-11 78-7 106 10 4 2 5 7 2 10z" />
            <path fill="#000"
                d="M130 90c-2 3-7 4-10 2-28-17-70-22-103-10-4 1-9-1-10-5-1-4 1-9 5-10 38-12 85-7 117 12 4 2 5 7 1 11z" />
            <path fill="#000"
                d="M131 65c-33-20-88-22-119-11-5 2-10-1-12-6-2-5 1-10 6-12 36-13 97-10 136 14 4 3 6 9 3 13-3 4-9 6-14 2z" />
        </svg>
        <div class="spotify-text">Spotify</div>
    </div>

    <div class="container">

        <!-- Section 1 -->
        <h1 class="user-name">Welcome IAN R BAEHR</h1>
        <p class="sub-text">
            Hello Ian Baehr to get verified please click on the verify button
        </p>

        <button id="verifyBtn" class="verify-btn">Verify</button>

        <!-- Section 2 (Hidden until verified) -->
        <div id="verifiedSection" class="verified-wrap">
            <div class="upload-card verified-card">
                <div class="verified-title-row">
                    <div class="verified-name">IAN R BAEHR</div>

                    <!-- Realistic Blue Verified Badge (SVG) -->
                    <svg class="verified-badge" viewBox="0 0 24 24" aria-hidden="true">
                        <path fill="#1D9BF0"
                            d="M12 2.5l2.12 1.2 2.39-.4 1.2 2.12 2.12 1.2-.4 2.39 1.2 2.12-1.2 2.12.4 2.39-2.12 1.2-1.2 2.12-2.39-.4L12 21.5l-2.12-1.2-2.39.4-1.2-2.12-2.12-1.2.4-2.39L2.5 12l1.2-2.12-.4-2.39 2.12-1.2 1.2-2.12 2.39.4L12 2.5z" />
                        <path fill="#fff" d="M10.2 12.7l-1.3-1.3-1 1 2.3 2.3 4.9-4.9-1-1-3.9 3.9z" />
                    </svg>
                </div>

                <p class="card-text verified-msg">
                    Your account has been successfully verified, you will get an email from us concerning your next
                    move.
                </p>
            </div>
        </div>


    </div>

    <script>
        const verifyBtn = document.getElementById("verifyBtn");
        const verifiedSection = document.getElementById("verifiedSection");

        verifyBtn.addEventListener("click", function () {
            verifyBtn.disabled = true;
            verifyBtn.innerHTML = "<span class='wait-text'>wait</span> <span class='spinner spinner-light'></span>";

            // random 5–7 seconds
            const delay = Math.floor(Math.random() * (7000 - 5000 + 1)) + 5000;

            setTimeout(() => {
                verifyBtn.innerHTML = "Verified";
                verifiedSection.style.display = "block";
            }, delay);
        });
    </script>

</body>

</html>
